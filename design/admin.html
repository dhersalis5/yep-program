<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>YEP · Applications</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#f4f1e7; --paper2:#ece7d8; --card:#fbfaf4; --line:#ddd7c6; --line2:#cbc4af;
    --ink:#181810; --ink-soft:#56544a; --ink-faint:#8a877a;
    --lime:#cdf03a; --lime-deep:#5f7a0c; --teal:#1f9b8a; --teal-deep:#0f6e62; --red:#b4452f;
    --disp:'Bricolage Grotesque',sans-serif; --body:'Hanken Grotesk',sans-serif; --mono:'Space Mono',monospace;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--paper); color:var(--ink); font-family:var(--body); line-height:1.6; -webkit-font-smoothing:antialiased; }
  .wrap{ max-width:920px; margin:0 auto; padding:0 24px; }
  .mono{ font-family:var(--mono); }
  button{ font-family:var(--body); font-weight:700; font-size:14px; cursor:pointer; border:none; border-radius:8px; padding:10px 16px; transition:.16s; display:inline-flex; align-items:center; gap:7px; }
  .btn-ink{ background:var(--ink); color:var(--lime); }
  .btn-ink:hover{ transform:translateY(-1px); }
  .btn-ghost{ background:transparent; color:var(--ink); border:1px solid var(--line2); }
  .btn-ghost:hover{ border-color:var(--ink); }
  input{ font-family:var(--body); font-size:15px; padding:12px 14px; border:1px solid var(--line2); border-radius:8px; background:var(--card); color:var(--ink); width:100%; }
  input:focus{ outline:none; border-color:var(--ink); }

  /* top bar */
  header{ position:sticky; top:0; z-index:10; background:rgba(244,241,231,.9); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); }
  .bar{ display:flex; align-items:center; justify-content:space-between; height:64px; gap:16px; flex-wrap:wrap; }
  .title{ display:flex; align-items:baseline; gap:12px; }
  .title .yep{ font-family:var(--disp); font-weight:800; font-size:22px; letter-spacing:-.03em; }
  .title .yep .e{ color:var(--lime-deep); }
  .title .sub{ font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint); }
  .actions{ display:flex; gap:10px; align-items:center; }
  .count{ font-family:var(--mono); font-size:12px; color:var(--ink-soft); background:var(--paper2); border:1px solid var(--line); padding:6px 11px; border-radius:999px; }

  /* gate */
  .gate{ max-width:420px; margin:14vh auto 0; text-align:center; }
  .gate .yep{ font-family:var(--disp); font-weight:800; font-size:34px; letter-spacing:-.03em; }
  .gate .yep .e{ color:var(--lime-deep); }
  .gate h1{ font-family:var(--disp); font-weight:700; font-size:24px; margin:18px 0 6px; letter-spacing:-.02em; }
  .gate p{ color:var(--ink-soft); font-size:15px; margin-bottom:22px; }
  .gate form{ display:flex; flex-direction:column; gap:12px; }
  .gate .hint{ font-family:var(--mono); font-size:11.5px; color:var(--ink-faint); margin-top:14px; line-height:1.6; }
  .err{ color:var(--red); font-size:13px; font-family:var(--mono); min-height:18px; }

  /* toolbar */
  .toolbar{ display:flex; gap:12px; align-items:center; margin:26px 0 18px; flex-wrap:wrap; }
  .toolbar .search{ flex:1; min-width:200px; }
  .toolbar .search input{ padding:10px 14px; }

  /* application cards */
  .app{ background:var(--card); border:1px solid var(--line2); border-radius:14px; margin-bottom:14px; overflow:hidden; }
  .app-top{ display:flex; align-items:center; gap:16px; padding:18px 20px; cursor:pointer; }
  .app-top:hover{ background:var(--paper); }
  .avatar{ width:42px; height:42px; border-radius:50%; background:var(--ink); color:var(--lime); display:flex; align-items:center; justify-content:center; font-family:var(--disp); font-weight:800; font-size:15px; flex:none; }
  .app-id{ flex:1; min-width:0; }
  .app-id .nm{ font-weight:600; font-size:16px; }
  .app-id .meta{ font-size:13px; color:var(--ink-soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .app-id .meta a{ color:var(--teal-deep); text-decoration:none; }
  .app-when{ font-family:var(--mono); font-size:11px; color:var(--ink-faint); text-align:right; flex:none; }
  .chev{ flex:none; color:var(--ink-faint); transition:transform .2s; font-family:var(--mono); }
  .app.open .chev{ transform:rotate(90deg); }
  .app-body{ display:none; padding:4px 20px 22px; border-top:1px solid var(--line); }
  .app.open .app-body{ display:block; }
  .qa{ padding:14px 0; border-top:1px dashed var(--line2); }
  .qa:first-child{ border-top:none; }
  .qa .q{ font-family:var(--mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--lime-deep); margin-bottom:5px; }
  .qa .a{ font-size:15px; color:var(--ink); white-space:pre-wrap; }
  .qa .a.empty{ color:var(--ink-faint); font-style:italic; }
  .pill{ display:inline-block; font-family:var(--mono); font-size:11px; padding:3px 9px; border-radius:999px; }
  .pill.yes{ background:rgba(31,155,138,.14); color:var(--teal-deep); }
  .pill.no{ background:rgba(180,69,47,.12); color:var(--red); }
  .empty-state{ text-align:center; color:var(--ink-faint); padding:60px 0; font-family:var(--mono); font-size:13px; }
  .loading{ text-align:center; color:var(--ink-soft); padding:60px 0; font-family:var(--mono); font-size:13px; }
</style>
</head>
<body>

  <!-- GATE -->
  <div id="gate" class="wrap gate" style="display:none">
    <div class="yep">Y<span class="e">E</span>P</div>
    <h1>Applications</h1>
    <p>Enter the admin token to view submissions.</p>
    <form id="gate-form">
      <input id="token-input" type="password" placeholder="Admin token" autocomplete="off" />
      <button class="btn-ink" type="submit">Unlock →</button>
      <div class="err" id="gate-err"></div>
    </form>
    <div class="hint">Find it in Render → your <b>yep-program</b> service → <b>Environment</b> → <b>ADMIN_TOKEN</b> → copy the value.</div>
  </div>

  <!-- DASHBOARD -->
  <div id="dash" style="display:none">
    <header>
      <div class="wrap bar">
        <div class="title">
          <span class="yep">Y<span class="e">E</span>P</span>
          <span class="sub">Applications</span>
          <span class="count" id="count">—</span>
        </div>
        <div class="actions">
          <button class="btn-ghost" id="refresh">↻ Refresh</button>
          <button class="btn-ink" id="export">↓ Export CSV</button>
          <button class="btn-ghost" id="logout">Log out</button>
        </div>
      </div>
    </header>
    <main class="wrap">
      <div class="toolbar">
        <div class="search"><input id="search" type="text" placeholder="Search by name, email, school…" /></div>
      </div>
      <div id="list"><div class="loading">Loading…</div></div>
    </main>
  </div>

  <script>
    const KEY = "yep_admin_token";
    const $ = (s) => document.querySelector(s);
    let token = localStorage.getItem(KEY) || "";
    let apps = [];

    const QUESTIONS = [
      ["why", "Why this program matters to you"],
      ["commitment", "Level of commitment"],
      ["hours", "Hours per week"],
      ["strengths", "Strengths they have"],
      ["develop", "Strengths to develop"],
      ["track_record", "Track record / idea"],
      ["teammates", "Teammates in mind"],
    ];

    function initials(name){
      return (name||"?").trim().split(/\s+/).slice(0,2).map(w=>w[0]||"").join("").toUpperCase() || "?";
    }
    function fmtDate(s){
      if(!s) return "";
      const d = new Date(s); if(isNaN(d)) return s;
      return d.toLocaleDateString("en-US",{month:"short",day:"numeric"}) + " · " +
             d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
    }
    function esc(s){ return String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

    function showGate(msg){
      $("#dash").style.display="none";
      $("#gate").style.display="block";
      $("#gate-err").textContent = msg || "";
      $("#token-input").focus();
    }
    function showDash(){
      $("#gate").style.display="none";
      $("#dash").style.display="block";
    }

    async function load(){
      $("#list").innerHTML = '<div class="loading">Loading…</div>';
      let res;
      try{
        res = await fetch("/api/applications", { headers:{ "x-admin-token": token } });
      }catch(e){ showGate("Network error."); return; }
      if(res.status===401){ localStorage.removeItem(KEY); token=""; showGate("Invalid token."); return; }
      if(res.status===503){ showGate("Admin is disabled (ADMIN_TOKEN not set on the server)."); return; }
      if(!res.ok){ showGate("Error "+res.status); return; }
      const data = await res.json();
      apps = data.applications || [];
      localStorage.setItem(KEY, token);
      showDash();
      render();
    }

    function render(){
      const q = ($("#search").value||"").toLowerCase().trim();
      const filtered = apps.filter(a => !q ||
        [a.full_name,a.email,a.school,a.phone].some(v => String(v||"").toLowerCase().includes(q)));
      $("#count").textContent = filtered.length + (filtered.length===1?" application":" applications");
      if(!filtered.length){
        $("#list").innerHTML = '<div class="empty-state">'+(apps.length?'No matches.':'No applications yet.')+'</div>';
        return;
      }
      $("#list").innerHTML = filtered.map(a => {
        const rows = QUESTIONS.map(([k,label])=>{
          const val = a[k];
          const empty = val===null||val===undefined||String(val).trim()==="";
          return '<div class="qa"><div class="q">'+esc(label)+'</div><div class="a'+(empty?' empty':'')+'">'+(empty?'—':esc(val))+'</div></div>';
        }).join("");
        const agree = (a.agree===true||a.agree===1||a.agree==="1"||a.agree==="t");
        const agreePill = '<div class="qa"><div class="q">Commitment confirmed</div><div class="a"><span class="pill '+(agree?'yes':'no')+'">'+(agree?'Yes — weekly, max 10% absences':'Not confirmed')+'</span></div></div>';
        const phone = a.phone ? ' · '+esc(a.phone) : '';
        const school = a.school ? ' · '+esc(a.school) : '';
        const age = a.age ? ' · age '+esc(a.age) : '';
        return ''+
          '<div class="app" data-id="'+a.id+'">'+
            '<div class="app-top" onclick="this.parentNode.classList.toggle(\'open\')">'+
              '<div class="avatar">'+esc(initials(a.full_name))+'</div>'+
              '<div class="app-id">'+
                '<div class="nm">'+esc(a.full_name||"—")+'</div>'+
                '<div class="meta"><a href="mailto:'+esc(a.email)+'">'+esc(a.email)+'</a>'+phone+school+age+'</div>'+
              '</div>'+
              '<div class="app-when">'+esc(fmtDate(a.created_at))+'</div>'+
              '<div class="chev">›</div>'+
            '</div>'+
            '<div class="app-body">'+rows+agreePill+'</div>'+
          '</div>';
      }).join("");
    }

    async function exportCsv(){
      try{
        const res = await fetch("/api/applications.csv", { headers:{ "x-admin-token": token } });
        if(!res.ok){ alert("Export failed ("+res.status+")"); return; }
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = "yep-applications.csv";
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
      }catch(e){ alert("Export failed."); }
    }

    $("#gate-form").addEventListener("submit", (e)=>{
      e.preventDefault();
      token = $("#token-input").value.trim();
      if(!token){ $("#gate-err").textContent="Enter a token."; return; }
      load();
    });
    $("#refresh").addEventListener("click", load);
    $("#export").addEventListener("click", exportCsv);
    $("#logout").addEventListener("click", ()=>{ localStorage.removeItem(KEY); token=""; showGate(""); });
    $("#search").addEventListener("input", render);

    if(token) load(); else showGate("");
  </script>
</body>
</html>
