services:
  - type: web
    name: yep-program
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --omit=dev
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yep-db
          property: connectionString
      - key: ADMIN_TOKEN
        generateValue: true

databases:
  - name: yep-db
    plan: free
    region: oregon
